    url: 'http://localhost'
tags:
  -
    name: Endpoints
    description: ''
  -
    name: 'Lead Management'
    description: "\nAPI Endpoints for managing leads, including creation, retrieval, updates, and exports.\nAll endpoints are scoped to the authenticated user's current tenant."
components:
  securitySchemes:
    default:
